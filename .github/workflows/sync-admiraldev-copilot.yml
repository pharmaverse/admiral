name: Sync admiraldev Documentation for GitHub Copilot

on:
  push:
    branches: 2920-add-copilot-instructions
  # Run monthly to keep content fresh (only on main branch)
  schedule:
    - cron: '0 8 1 * *'  # 1st of every month at 8 AM UTC
  
  # Allow manual triggering from any branch
  workflow_dispatch:
    inputs:
      create_pr:
        description: 'Create Pull Request instead of direct commit'
        required: false
        default: false
        type: boolean
      target_branch:
        description: 'Target branch for PR (only used if create_pr is true)'
        required: false
        default: 'main'
        type: string

jobs:
  sync-admiraldev-docs:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write  # Needed to commit/create PRs
      pull-requests: write  # Needed to create PRs
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'
          
      - name: Install R dependencies
        run: |
          R -e "install.packages('glue')"
          
      - name: Run admiraldev sync script
        run: |
          Rscript .github/scripts/sync_admiraldev_copilot.R
          
      - name: Check if copilot-instructions.md changed
        id: check_changes
        run: |
          if git diff --quiet HEAD -- .github/copilot-instructions.md; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No changes detected in copilot-instructions.md"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Changes detected in copilot-instructions.md"
          fi
          
      - name: Get current branch and timestamp
        id: branch_info
        run: |
          echo "branch=${GITHUB_REF#refs/heads/}" >> $GITHUB_OUTPUT
          echo "timestamp=$(date -u +'%Y%m%d-%H%M%S')" >> $GITHUB_OUTPUT
          echo "date_readable=$(date -u +'%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_OUTPUT
          
      - name: Create Pull Request
        if: steps.check_changes.outputs.changed == 'true' && github.event.inputs.create_pr == 'true'
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: |
            chore: update GitHub Copilot instructions from admiraldev
            
            - Synced latest admiraldev programming strategy
            - Updated unit testing guidance  
            - Auto-generated on ${{ steps.branch_info.outputs.date_readable }}
          title: "chore: update GitHub Copilot instructions (${{ steps.branch_info.outputs.timestamp }})"
          body: |
            ## 📋 Admiraldev Documentation Sync
            
            This PR updates GitHub Copilot instructions with the latest admiral development guidelines.
            
            ### Changes
            - ✅ Downloaded latest admiraldev programming strategy
            - ✅ Updated unit testing guidance
            - ✅ Refreshed function naming conventions
            
            ### Generated Content
            - **File:** `.github/copilot-instructions.md`
            - **Source:** admiraldev vignettes from main branch
            - **Generated:** ${{ steps.branch_info.outputs.date_readable }}
            
            ### Impact
            GitHub Copilot will provide better admiral-specific code suggestions after this is merged.
            
            ---
            *Auto-generated by `.github/workflows/sync-admiraldev-copilot.yml`*
          branch: update-copilot-instructions-${{ steps.branch_info.outputs.timestamp }}
          base: ${{ github.event.inputs.target_branch || 'main' }}
          delete-branch: true
          
      - name: Direct commit (non-PR mode)
        if: steps.check_changes.outputs.changed == 'true' && github.event.inputs.create_pr != 'true'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add .github/copilot-instructions.md
          git commit -m "chore: update GitHub Copilot instructions from admiraldev

          - Synced latest admiraldev programming strategy
          - Updated unit testing guidance
          - Auto-generated on ${{ steps.branch_info.outputs.date_readable }}
          
          [skip ci]"
          
      - name: Push changes (non-PR mode)
        if: steps.check_changes.outputs.changed == 'true' && github.event.inputs.create_pr != 'true'
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ github.ref }}
          
      - name: Create summary
        run: |
          echo "## 📋 Admiraldev Sync Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** ${{ steps.branch_info.outputs.branch }}" >> $GITHUB_STEP_SUMMARY
          echo "**Mode:** ${{ github.event.inputs.create_pr == 'true' && 'Pull Request' || 'Direct Commit' }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [[ "${{ steps.check_changes.outputs.changed }}" == "true" ]]; then
            if [[ "${{ github.event.inputs.create_pr }}" == "true" ]]; then
              echo "✅ **Pull Request created**" >> $GITHUB_STEP_SUMMARY
              echo "- Branch: \`update-copilot-instructions-${{ steps.branch_info.outputs.timestamp }}\`" >> $GITHUB_STEP_SUMMARY
              echo "- Target: \`${{ github.event.inputs.target_branch || 'main' }}\`" >> $GITHUB_STEP_SUMMARY
            else
              echo "✅ **Changes committed directly**" >> $GITHUB_STEP_SUMMARY
              echo "- Updated \`.github/copilot-instructions.md\`" >> $GITHUB_STEP_SUMMARY
            fi
            echo "- GitHub Copilot now has latest admiral guidelines" >> $GITHUB_STEP_SUMMARY
          else
            echo "ℹ️ **No changes detected**" >> $GITHUB_STEP_SUMMARY
            echo "- Copilot instructions are already up to date" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Next scheduled run:** First day of next month (main branch only)" >> $GITHUB_STEP_SUMMARY
