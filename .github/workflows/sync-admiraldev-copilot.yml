name: Sync AI Assistant Context from admiraldev

on:
  # Run monthly to keep content fresh (only on main branch)
  schedule:
    - cron: '0 8 1 * *'  # 1st of every month at 8 AM UTC
  
  # Allow manual triggering from any branch
  workflow_dispatch:
    inputs:
      target_branch:
        description: 'Base branch for the Pull Request'
        required: false
        default: 'main'
        type: string

jobs:
  sync-ai-assistant-context:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write  # Needed to commit/create PRs
      pull-requests: write  # Needed to create PRs
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'
          
      - name: Install R dependencies
        run: |
          R -e "install.packages('glue')"
          
      - name: Run admiraldev sync script
        run: |
          Rscript .github/scripts/sync_admiraldev_copilot.R
          
      - name: Check if AI assistant files changed
        id: check_changes
        run: |
          # Check all AI assistant context files
          if git diff --quiet HEAD -- AGENTS.md tests/testthat/AGENTS.md .github/copilot-instructions.md; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No changes detected in AI assistant files"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Changes detected in AI assistant files"
            echo "Files changed:"
            git diff --name-only HEAD -- AGENTS.md tests/testthat/AGENTS.md .github/copilot-instructions.md | sed 's/^/  - /'
          fi
          
      - name: Get current branch and timestamp
        id: branch_info
        run: |
          echo "branch=${GITHUB_REF#refs/heads/}" >> $GITHUB_OUTPUT
          echo "timestamp=$(date -u +'%Y%m%d-%H%M%S')" >> $GITHUB_OUTPUT
          echo "date_readable=$(date -u +'%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_OUTPUT
          
      - name: Create Pull Request
        if: steps.check_changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: |
            chore: update AI assistant context from admiraldev
            
            - Synced latest admiraldev programming strategy
            - Updated unit testing guidance
            - Refreshed AGENTS.md files for universal AI support
            - Auto-generated on ${{ steps.branch_info.outputs.date_readable }}
          title: "chore: update AI assistant context (${{ steps.branch_info.outputs.timestamp }})"
          body: |
            ## 📋 Admiraldev Documentation Sync
            
            This PR updates AI assistant context with the latest admiral development guidelines.
            
            ### Changes
            - ✅ Downloaded latest admiraldev programming strategy
            - ✅ Updated unit testing guidance
            - ✅ Refreshed function naming conventions
            - ✅ Created/updated AGENTS.md files for universal AI support
            
            ### Generated Files
            - **`AGENTS.md`** - Universal AI assistant context (root level)
            - **`tests/testthat/AGENTS.md`** - Testing-specific guidelines
            - **`.github/copilot-instructions.md`** - GitHub Copilot (legacy)
            
            **Source:** admiraldev vignettes from main branch  
            **Generated:** ${{ steps.branch_info.outputs.date_readable }}
            
            ### Impact
            - GitHub Copilot, Gemini, Claude, and other AI assistants will provide better admiral-specific suggestions
            - Testing guidelines are now contextually available in the test directory
            - Future-proof approach supporting any AI coding assistant
            
            ---
            *Auto-generated by `.github/workflows/sync-admiraldev-copilot.yml`*
          branch: update-ai-assistant-context-${{ steps.branch_info.outputs.timestamp }}
          base: ${{ github.event.inputs.target_branch || 'main' }}
          delete-branch: true
          

      - name: Create summary
        run: |
          echo "## 📋 AI Assistant Context Sync Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** ${{ steps.branch_info.outputs.branch }}" >> $GITHUB_STEP_SUMMARY
          echo "**Mode:** Pull Request" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [[ "${{ steps.check_changes.outputs.changed }}" == "true" ]]; then
            echo "✅ **Pull Request created**" >> $GITHUB_STEP_SUMMARY
            echo "- Branch: \`update-ai-assistant-context-${{ steps.branch_info.outputs.timestamp }}\`" >> $GITHUB_STEP_SUMMARY
            echo "- Target: \`${{ github.event.inputs.target_branch || 'main' }}\`" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Files managed:**" >> $GITHUB_STEP_SUMMARY
            echo "- 📄 \`AGENTS.md\` (universal AI assistants)" >> $GITHUB_STEP_SUMMARY
            echo "- 📄 \`tests/testthat/AGENTS.md\` (testing context)" >> $GITHUB_STEP_SUMMARY
            echo "- 📄 \`.github/copilot-instructions.md\` (Copilot legacy)" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**AI assistants supported:** GitHub Copilot, Gemini, Claude, and others" >> $GITHUB_STEP_SUMMARY
          else
            echo "ℹ️ **No changes detected**" >> $GITHUB_STEP_SUMMARY
            echo "- AI assistant context files are already up to date" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Next scheduled run:** First day of next month (main branch only)" >> $GITHUB_STEP_SUMMARY
