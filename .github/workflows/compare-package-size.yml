---
name: Compare Package Size to CRAN

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to compare against the current CRAN release
        required: true
        default: main
        type: string

permissions:
  contents: read

jobs:
  compare-package-size:
    name: Compare package size
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2

      - name: Generate package size reports
        run: |
          Rscript "${{ github.workspace }}/.github/scripts/compare_package_sizes.R" \
            --output_dir "${{ github.workspace }}/reports" \
            --github_repo "pharmaverse/admiral" \
            --github_ref "${{ inputs.ref }}"

      - name: Publish package size summary to job summary
        run: cat "${{ github.workspace }}/reports/package-size-summary.md" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload package size reports
        uses: actions/upload-artifact@v4
        with:
          name: package-size-reports
          path: |
            ${{ github.workspace }}/reports/package-size-summary.md
            ${{ github.workspace }}/reports/package-size-report.md
          if-no-files-found: error
